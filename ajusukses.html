<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pengajuan Sukses - Layanan Perpustakaan FST</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="dashboard-style.css">
    <link rel="stylesheet" href="formpengajuan-style.css">
    <style>
        /* Gaya khusus untuk komponen status sukses peminjaman */
        .success-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            padding: 20px 0;
        }

        .success-circle-icon {
            width: 130px;
            height: 130px;
            background-color: #4cd137;
            color: #ffffff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 65px;
            margin-bottom: 25px;
            box-shadow: 0 4px 10px rgba(76, 209, 55, 0.3);
        }

        .success-message-text {
            font-size: 26px;
            font-weight: 600;
            color: #1a365d;
            line-height: 1.3;
            margin-bottom: 25px;
            max-width: 320px;
        }

        .btn-back-dashboard {
            background-color: #2c3e50;
            color: #ffffff;
            font-size: 16px;
            font-weight: 500;
            border: none;
            padding: 10px 24px;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: background-color 0.2s;
        }

        .btn-back-dashboard:hover {
            background-color: #1a252f;
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <img src="logofst.png" alt="Logo UIN FST">
                <div class="logo-text">
                    <span class="fac">FAKULTAS</span>
                    <span class="dept">SAINS DAN TEKNOLOGI</span>
                </div>
            </div>
            
            <hr class="sidebar-divider">

            <nav class="sidebar-menu">
                <a href="welpageuser.html" class="menu-item">Dashboard</a>
                <a href="bukperuser.html" class="menu-item active">> Buku Perpustakaan</a>
                <a href="buksem.html" class="menu-item">Buku Disematkan</a>
                <a href="riwuser.html" class="menu-item">Riwayat</a>
                <a href="#" class="menu-item">Pengaturan</a>
            </nav>

            <a href="loginpage.html" class="logout-btn">
                <i class="fa-solid fa-right-from-bracket"></i> Log Out
            </a>
        </aside>

        <main class="main-content">
            <header class="content-header">
                <h1>Form Peminjaman</h1>
                <hr class="header-line">
            </header>

            <div class="form-main-card">
                
                <div class="form-left-side" style="padding-right: 0;">
                    <div class="success-wrapper">
                        <div class="success-circle-icon">
                            <i class="fa-solid fa-check"></i>
                        </div>
                        
                        <div class="success-message-text">
                            Ajuan Peminjaman Sukses Terkirim!
                        </div>
                        
                        <button class="btn-back-dashboard" onclick="window.location.href='welpageuser.html';">
                            Kembali ke Dashboard
                        </button>
                    </div>
                </div>

                <div class="center-divider"></div>

                <div class="form-right-side">
                    <span class="badge-status-top">Buku dipinjam</span>
                    
                    <div class="image-box-preview">
                        <img src="https://images-na.ssl-images-amazon.com/images/S/compressed.photo.goodreads.com/books/1348379100i/359132.jpg" alt="Preview Cover">
                    </div>

                    <div class="text-tag-blue">The Mathematical Universe</div>
                    <div class="text-tag-yellow">William Dunham</div>
                </div>

            </div>
        </main>
    </div>

</body>
</html>
