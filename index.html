<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layanan Perpustakaan FST</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<body>

    <div class="container">
        <div class="left-section">
            <div class="form-wrapper">
                <h2>Selamat datang!</h2>
                <p class="subtitle">Silahkan masukkan detail anda untuk menggunakan layanan.</p>

                <form id="loginForm">
                    <div class="input-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" placeholder="contoh@gmail.com" required>
                    </div>

                    <div class="input-group">
                        <label for="password">Kata Sandi</label>
                        <div class="password-wrapper">
                            <input type="password" id="password" placeholder="masukkan password anda" required>
                            <i class="fa-regular fa-eye toggle-password"></i>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary">Masuk</button>
                </form>

                <div class="divider">
                    <span>atau</span>
                </div>

                <button type="button" class="btn btn-primary" onclick="window.location.href='daftar.html'">Daftar</button>
            </div>
        </div>

        <div class="right-section">
            <div class="logo-wrapper">
                <img src="logofst.png" alt="Logo UIN FST" class="logo">
                <h1>Layanan<br>Perpustakaan FST</h1>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault(); // This stops the page from reloading

            // Get the values
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Add your validation logic here if needed
            // For now, it will simply redirect
            window.location.href = 'welpageuser.html';
        });
    </script>

</body>
</html>
